<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Paper Reader</title>
  <meta name="description" content="AI-powered academic paper reader with translation, annotation and Q&A" />
  <!-- 
    版本 / Version: 3.0.0
    修改基准 / Based on: v2.0.0
    修改内容 / Changes (v2.0.0 → v3.0.0):
      - [新增] Google Fonts: Playfair Display + Source Sans 3
        [New] Google Fonts for elegant typography
      - [替换] Emoji 图标 → SVG 内联图标
        [Replace] Emoji icons with inline SVG icons
      - [优化] 更精致的 HTML 结构与语义
        [Improve] More refined HTML structure and semantics
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/index.css" />
  <link rel="stylesheet" href="/styles/pdf-viewer.css" />
  <link rel="stylesheet" href="/styles/bubble.css" />
  <link rel="stylesheet" href="/styles/sidebar.css" />
  <link rel="stylesheet" href="/styles/annotations.css" />
  <link rel="stylesheet" href="/styles/markdown.css" />
</head>
<body>
  <!-- ========== 顶部工具栏 / Top Toolbar ========== -->
  <header id="toolbar" class="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-logo">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="logo-text">Paper Reader</span>
        <span class="logo-version">V3</span>
      </div>
      <span id="docTitle" class="toolbar-doc-title">请上传 PDF 文献</span>
    </div>

    <div class="toolbar-center">
      <button id="prevPage" class="toolbar-btn toolbar-btn-icon" title="上一页">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <input id="pageInput" type="number" class="page-input" value="1" min="1" />
      <span class="page-sep">/ <span id="totalPages">0</span></span>
      <button id="nextPage" class="toolbar-btn toolbar-btn-icon" title="下一页">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <span class="toolbar-divider"></span>
      <button id="zoomIn" class="toolbar-btn toolbar-btn-icon" title="放大">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span id="zoomLevel" class="zoom-label">100%</span>
      <button id="zoomOut" class="toolbar-btn toolbar-btn-icon" title="缩小">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
    </div>

    <div class="toolbar-right">
      <!-- 引擎切换器 / Engine Toggle -->
      <div class="engine-toggle" id="engineToggle">
        <button class="engine-btn active" data-engine="cli" title="使用本地 Gemini CLI">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          CLI
        </button>
        <button class="engine-btn" data-engine="api" title="使用 REST API (更快)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          API
        </button>
      </div>
      <div class="api-key-input-wrap hidden" id="apiKeyWrap">
        <input id="apiKeyInput" type="password" class="api-key-input" placeholder="API Key..." />
        <button id="apiKeySet" class="api-key-set-btn" title="确认">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
      <span class="toolbar-divider"></span>
      <!-- 模型选择器 / Model Selector -->
      <div class="model-selector" title="AI 模型选择">
        <svg class="model-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><circle cx="9" cy="15" r="1"/><circle cx="15" cy="15" r="1"/></svg>
        <select id="modelSelect" class="model-dropdown">
          <option value="flash" selected>Flash · 快速</option>
          <option value="pro">Pro · 精准</option>
        </select>
      </div>
      <span class="toolbar-divider"></span>
      <button id="uploadBtn" class="toolbar-btn toolbar-btn-primary" title="上传 PDF (Ctrl+O)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>上传</span>
      </button>
      <button id="summaryBtn" class="toolbar-btn" title="AI 摘要">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>摘要</span>
      </button>
      <button id="exportBtn" class="toolbar-btn" title="导出笔记">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>导出</span>
      </button>
      <button id="sidebarToggle" class="toolbar-btn toolbar-btn-icon" title="侧栏 (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </button>
    </div>
  </header>

  <!-- ========== 主内容区 / Main Content ========== -->
  <main id="mainContent" class="main-content">
    <!-- PDF 查看器 / PDF Viewer -->
    <div id="pdfViewer" class="pdf-viewer">
      <!-- 欢迎页 / Welcome Screen -->
      <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-ornament"></div>
        <div class="welcome-icon-wrap">
          <svg class="welcome-icon" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <h1 class="welcome-title">Paper Reader</h1>
        <p class="welcome-subtitle">上传一篇学术论文，开启 AI 辅助阅读之旅</p>
        <div class="feature-grid">
          <div class="feature-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 8l6 6"/><path d="M4 14l6-6 2 2"/><path d="M2 5h12"/><path d="M7 2h10"/><circle cx="18" cy="18" r="3"/><path d="M20.2 20.2L22 22"/></svg>
            <span>选中即翻译</span>
          </div>
          <div class="feature-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span>术语解释</span>
          </div>
          <div class="feature-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            <span>持久批注</span>
          </div>
          <div class="feature-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <span>气泡对话</span>
          </div>
        </div>
        <button id="welcomeUpload" class="welcome-upload-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          投递学术文献
        </button>
      </div>

      <!-- PDF 页面容器 / PDF Pages Container -->
      <div id="pdfPages" class="pdf-pages"></div>
    </div>

    <!-- ========== 侧栏 / Sidebar ========== -->
    <aside id="sidebar" class="sidebar hidden">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="summary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          摘要
        </button>
        <button class="sidebar-tab" data-tab="qa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          问答
        </button>
        <button class="sidebar-tab" data-tab="history">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          历史
        </button>
      </div>

      <!-- 摘要面板 -->
      <div id="summaryPanel" class="sidebar-panel active" data-panel="summary">
        <div id="summaryContent" class="summary-content">
          <p class="placeholder-text">上传论文后点击「摘要」生成 AI 结构化摘要</p>
        </div>
      </div>

      <!-- 问答面板 -->
      <div id="qaPanel" class="sidebar-panel" data-panel="qa">
        <div id="qaMessages" class="qa-messages">
          <div class="qa-placeholder">上传论文后可在此与 AI 深度对话</div>
        </div>
        <div class="qa-input-area">
          <input id="qaInput" type="text" placeholder="输入问题..." class="qa-input" />
          <button id="qaSend" class="qa-send-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

      <!-- 历史面板 -->
      <div id="historyPanel" class="sidebar-panel" data-panel="history">
        <div id="historyContent" class="history-content">
          <p class="placeholder-text">选中文本进行翻译或解释后，记录将显示在这里</p>
        </div>
      </div>
    </aside>
  </main>

  <!-- ========== 选中文本工具条 / Selection Toolbar ========== -->
  <div id="selectionToolbar" class="selection-toolbar hidden">
    <button class="sel-btn" data-action="translate" title="翻译选中文本">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6"/><path d="M4 14l6-6 2 2"/><path d="M2 5h12"/><path d="M7 2h10"/></svg>
      翻译
    </button>
    <button class="sel-btn" data-action="explain" title="解释术语/概念">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      解释
    </button>
    <button class="sel-btn" data-action="ask" title="针对选中内容提问">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      提问
    </button>
    <button class="sel-btn sel-btn-highlight" data-action="highlight" title="高亮标记">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  </div>

  <!-- ========== 翻译/解释气泡 / AI Bubble ========== -->
  <div id="aiBubble" class="ai-bubble hidden">
    <div class="bubble-header">
      <svg class="bubble-icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><circle cx="9" cy="15" r="1"/><circle cx="15" cy="15" r="1"/></svg>
      <span class="bubble-title">AI 翻译</span>
      <span class="bubble-model-badge" id="bubbleModelBadge">Flash</span>
      <button class="bubble-close" id="bubbleClose">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="bubble-original" id="bubbleOriginal"></div>
    <div class="bubble-content" id="bubbleContent">
      <div class="bubble-loading">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
    <div class="bubble-actions">
      <button class="bubble-action-btn" id="bubbleCopy">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        复制
      </button>
      <button class="bubble-action-btn bubble-action-primary" id="bubbleInsert">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        固定批注
      </button>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept=".pdf" class="hidden" />

  <!-- 提示消息 -->
  <div id="toast" class="toast hidden"></div>

  <!-- 加载遮罩 -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loadingText">处理中...</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
