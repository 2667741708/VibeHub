<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusDemo — 交互式焦点缩放演示仪</title>
    <meta name="description" content="让普通的录屏瞬间拥有高级感！交互式为视频添加平滑的焦点缩放运镜，支持多段剪辑与死区自动裁剪。">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- ===== HEADER ===== -->
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span>FocusDemo</span>
            </div>
            <div class="header-actions">
                <button class="btn" id="btn-add-clip">
                    <span>📂</span> 导入视频
                </button>
                <input type="file" id="video-upload" accept="video/*" multiple style="display:none;">
                <button class="btn" id="btn-auto-trim" title="自动裁剪静止的死区时间">
                    <span>✂️</span> 智能删余
                </button>
                <button class="btn" id="btn-clear-kf" title="清除当前片段的所有焦点标记">
                    <span>🗑️</span> 清除标记
                </button>
                <button class="btn btn-primary" id="btn-export" title="导出项目配置 JSON">
                    <span>💾</span> 导出项目
                </button>
            </div>
        </header>

        <!-- ===== MAIN STAGE ===== -->
        <div class="stage">
            <div class="video-viewport" id="video-viewport">

                <!-- 空状态 -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">🎬</div>
                    <p>点击上方「导入视频」添加你的录屏片段</p>
                    <p style="font-size:12px; color: var(--text-muted);">支持 MP4, WebM, MOV 等格式</p>
                </div>

                <!-- 视频播放器 -->
                <video id="main-video" controls playsinline></video>

                <!-- 缩放倍率指示器 -->
                <div class="zoom-indicator" id="zoom-indicator">🔍 1.0x</div>

                <!-- 操作提示 -->
                <div class="hint-toast" id="hint-toast">
                    在需要放大的位置 <b>双击鼠标</b> 添加焦点 · 再次双击缩回全景
                </div>
            </div>
        </div>

        <!-- ===== TIMELINE PANEL ===== -->
        <div class="timeline-panel">
            <!-- 工具栏 -->
            <div class="timeline-toolbar">
                <div class="timeline-toolbar-left">
                    <span class="timeline-label">📹 片段轨道</span>
                </div>
                <div class="timeline-toolbar-right">
                    <button class="btn btn-sm" onclick="playAll()" title="连续播放所有片段">
                        ▶ 连播
                    </button>
                </div>
            </div>

            <!-- 片段缩略图轨道 -->
            <div class="clip-track" id="clip-track">
                <!-- 由 JS 动态渲染 -->
            </div>

            <!-- 关键帧标记轨道 -->
            <div class="keyframe-track" id="kf-track">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>

    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <!-- 脚本 -->
    <script src="app.js"></script>
</body>
</html>
